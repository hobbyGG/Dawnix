version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dawnix_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: root
      POSTGRES_INITDB_ARGS: "-c TimeZone=Asia/Shanghai"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dawnix_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dawnix_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dawnix_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dawnix_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
